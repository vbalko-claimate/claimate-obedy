<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prague Lunch Menus — 12 restaurants near Kunratice</title>
    <meta name="description" content="Daily lunch menus from 12+ Prague restaurants near Kunratice. Compare prices, filter by distance." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Lunch Menus</h1>
        <div class="header-date" id="header-date"></div>
      </header>

      <div class="toolbar">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="walk">Walking</button>
          <button class="filter-btn" data-filter="car">Driving</button>
        </div>
        <div class="toolbar-right">
          <div class="theme-switch-wrapper">
            <label class="theme-switch" for="theme-toggle" aria-label="Toggle dark mode">
              <input type="checkbox" id="theme-toggle" aria-label="Toggle dark mode" />
              <span class="slider round"></span>
            </label>
            <span class="theme-label" id="theme-label">Dark</span>
          </div>
        </div>
      </div>

      <div class="cards-container" id="restaurants-grid">
        <div class="loading" role="status">
          <div class="loader-spinner"></div>
          <div>Loading restaurants...</div>
        </div>
      </div>
    </div>

    <footer>
      <p>Menu data by <a href="https://claimate.tech" target="_blank" rel="noopener noreferrer">CLAIMATE Tech</a></p>
      <p class="app-info"></p>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
